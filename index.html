<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaSeek</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ... (All previous CSS remains IDENTICAL to the last version) ... */
        :root {
            --font-family-logo: 'Montserrat', 'Roboto', sans-serif;
            --font-family-main: 'Roboto', 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            --font-family-body: 'Open Sans', 'Roboto', sans-serif;
            --color-primary-accent: #82AAFF; 
            --color-on-primary-accent: #001D3F; 
            --color-primary-container: #004788; 
            --color-on-primary-container: #D4E3FF;
            --color-secondary-accent: #ADC6FF; 
            --color-on-secondary-accent: #002858;
            --color-secondary-container: #294270;
            --color-on-secondary-container: #D8E2FF;
            --color-background: #1A1C1E; 
            --color-surface: #242629; 
            --color-surface-container: #2D2F33; 
            --color-surface-container-high: #383A3E; 
            --color-surface-container-highest: #43454A;
            --color-on-surface: #E2E2E6;         
            --color-on-surface-variant: #BEC6D0; 
            --color-outline: #8A9099;            
            --color-outline-variant: #40454C;    
            --color-error: #FFB4AB;
            --color-on-error: #690005;
            --border-radius-small: 6px; 
            --border-radius-medium: 10px;
            --border-radius-card: 16px; 
            --border-radius-large: 20px;
            --border-radius-extra-large: 30px;
            --border-radius-full: 999px;
            --elevation-0: none;
            --elevation-1: 0px 2px 4px rgba(0,0,0,0.15), 0px 1px 2px rgba(0,0,0,0.1);
            --elevation-2: 0px 5px 10px rgba(0,0,0,0.15), 0px 2px 4px rgba(0,0,0,0.1);
            --elevation-3: 0px 8px 16px rgba(0,0,0,0.15), 0px 4px 8px rgba(0,0,0,0.1);
            --ripple-color: rgba(173, 198, 255, 0.15); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; scroll-behavior: smooth; }
        body {
            min-height: 100%; font-family: var(--font-family-main);
            background-color: var(--color-background); color: var(--color-on-background);
            display: flex; flex-direction: column; line-height: 1.55; 
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        .app-container { display: flex; flex-direction: column; width: 100%; flex-grow: 1; overflow: hidden; }
        .app-header {
            display: flex; align-items: center; padding: 16px 20px; 
            background-color: var(--color-surface); min-height: 72px; 
            z-index: 10; border-bottom: 1px solid var(--color-outline-variant);
        }
        .header-back-btn {
            background: none; border: none; color: var(--color-on-surface-variant);
            font-size: 1.75rem; cursor: pointer; padding: 10px; 
            margin-right: 12px; border-radius: var(--border-radius-full);
            display: none; transition: background-color 0.2s, color 0.2s; line-height: 1;
        }
        .header-back-btn:hover { background-color: var(--color-surface-container-high); color: var(--color-on-surface); }
        .header-back-btn svg { display: block; } 
        .header-title-area { text-align: left; flex-grow: 1; }
        .app-header.center-title .header-title-area { text-align: center; }
        #platform-name { 
            font-family: var(--font-family-logo); font-size: 2.5rem; 
            color: var(--color-on-surface); font-weight: 800; 
            letter-spacing: -1px; line-height: 1.1; 
        }
        #platform-tagline {
            font-size: 0.9rem; color: var(--color-on-surface-variant);
            margin-top: 4px; font-weight: 400;
        }
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; 
            width: 100%; max-width: 720px; margin: 0 auto;
            overflow-y: auto; padding: 32px 20px; 
            padding-bottom: calc(72px + 32px + 40px); 
        }
        .prompt-text {
            font-size: 2rem; color: var(--color-on-surface-variant);
            line-height: 1.4; font-weight: 400; text-align: center;
            margin-bottom: 48px; margin-top: 24px; 
        }
        .prompt-text.subtle { font-size: 1rem; margin-top: -24px; }
        .action-area {
            width: 100%; padding: 20px; position: sticky; 
            bottom: 0; left: 0; right: 0;
            background-color: var(--color-surface); 
            border-top: 1px solid var(--color-outline-variant);
            z-index: 10; display: flex; justify-content: center;
        }
        .action-area-content { width: 100%; max-width: 480px; }
        .primary-action-button {
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px 24px; 
            background-color: var(--color-primary-container);
            color: var(--color-on-primary-container);
            border: none; border-radius: var(--border-radius-extra-large);
            font-size: 1.05rem; font-weight: 500; letter-spacing: 0.04em;
            cursor: pointer; text-decoration: none; box-shadow: var(--elevation-1);
            transition: background-color 0.2s, box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .primary-action-button:hover {
            background-color: color-mix(in srgb, var(--color-primary-container) 90%, white 10%);
            box-shadow: var(--elevation-2);
        }
        .primary-action-button .icon { margin-right: 12px; font-size: 1.5rem; }
        .primary-action-button .icon svg { display: block; }
        .search-input-wrapper { display: none; width: 100%; }
        #search-query-input {
            width: 100%; padding: 18px 20px; 
            background-color: var(--color-surface-container); 
            color: var(--color-on-surface);
            border: 1px solid var(--color-outline-variant); 
            border-radius: var(--border-radius-medium); 
            font-size: 1rem; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        #search-query-input:focus {
            outline: none; border-color: var(--color-primary-accent);
            background-color: var(--color-surface-container-high);
            box-shadow: 0 0 0 2px rgba(var(--color-primary-accent-rgb, 130,170,255), 0.3); 
        }
        #search-query-input::placeholder { color: var(--color-on-surface-variant); opacity: 0.8; }
        .results-list { list-style: none; width: 100%; }
        .result-item-card {
            background-color: var(--color-surface-container);
            border-radius: var(--border-radius-card);
            padding: 20px; margin-bottom: 16px; cursor: pointer;
            border: 1px solid var(--color-outline-variant); 
            box-shadow: var(--elevation-0); 
            transition: background-color 0.2s, transform 0.15s ease-out, border-color 0.2s, box-shadow 0.2s;
            text-align: left;
        }
        .result-item-card:hover {
            background-color: var(--color-surface-container-high);
            border-color: var(--color-outline); transform: translateY(-2px);
            box-shadow: var(--elevation-1);
        }
        .result-item-card strong {
            display: block; font-size: 1.2rem; font-weight: 500;
            color: var(--color-on-surface); margin-bottom: 8px; line-height: 1.35;
        }
        .result-item-card small {
            font-family: var(--font-family-body);
            font-size: 0.9rem; color: var(--color-on-surface-variant);
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; line-height: 1.6;
        }
        .summary-wrapper {
            background-color: var(--color-surface-container);
            border-radius: var(--border-radius-card);
            padding: 24px; margin-top: 20px; width: 100%;
            border: 1px solid var(--color-outline-variant); text-align: left;
        }
        .summary-title {
            font-family: var(--font-family-logo); font-size: 1.75rem;
            font-weight: 700; color: var(--color-on-surface);
            margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 1px solid var(--color-outline-variant); line-height: 1.3;
        }
        .summary-content {
            font-family: var(--font-family-body); font-size: 1rem; 
            line-height: 1.8; color: var(--color-on-surface);
            max-height: 60vh; overflow-y: auto; padding-right: 10px;
        }
        .summary-content::-webkit-scrollbar { width: 8px; }
        .summary-content::-webkit-scrollbar-track { background: transparent; }
        .summary-content::-webkit-scrollbar-thumb { background: var(--color-outline-variant); border-radius: 4px;}
        .summary-content::-webkit-scrollbar-thumb:hover { background: var(--color-outline); }
        .summary-content p:first-child { margin-top: 0; }
        .summary-content p { margin-bottom: 1.5em; } 
        .summary-content a { color: var(--color-primary-accent); text-decoration: none; font-weight: 500; }
        .summary-content a:hover { text-decoration: underline; color: color-mix(in srgb, var(--color-primary-accent) 80%, white 20%);}
        .summary-content .mw-editsection, .summary-content .toc, .summary-content .infobox,
        .summary-content .gallery, .summary-content .navbox, .summary-content .catlinks,
        .summary-content .printfooter, .summary-content .metadata,
        .summary-content .reference, .summary-content .references, .summary-content img, .summary-content table { 
            display: none !important; 
        }
        .summary-attribution {
            margin-top: 24px; padding-top: 16px;
            border-top: 1px solid var(--color-outline-variant);
            font-size: 0.85rem; color: var(--color-on-surface-variant);
            line-height: 1.6;
        }
        .summary-attribution a { /* This will be our main Wikipedia link */
            color: var(--color-on-surface-variant); 
            text-decoration: underline; 
            font-weight: 500; /* Make it slightly more prominent */
        }
        .summary-attribution a:hover { color: var(--color-primary-accent); }
        /* CSS for .view-full-article-btn can be removed if not used */
        /*
        .view-full-article-btn {
            display: inline-block; padding: 10px 24px;
            border-radius: var(--border-radius-full);
            text-decoration: none; margin-top: 24px;
            font-size: 0.9rem; font-weight: 500;
            border: 1px solid var(--color-outline);
            color: var(--color-primary-accent);
            transition: background-color 0.2s, color 0.2s;
            position: relative; overflow: hidden;
        }
        .view-full-article-btn:hover {
             background-color: rgba(var(--color-primary-accent-rgb, 130,170,255), 0.12);
             border-color: var(--color-primary-accent);
        }
        */
        .hidden { display: none !important; }
        .ripple { position: absolute; border-radius: 50%; background-color: var(--ripple-color); transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }
        @media (max-width: 600px) {
            .app-header { padding: 12px 16px; min-height: 64px; }
            #platform-name { font-size: 2rem; } #platform-tagline { font-size: 0.85rem; }
            .main-content { padding: 24px 16px; padding-bottom: calc(64px + 24px + 32px); }
            .prompt-text { font-size: 1.75rem; margin-bottom: 32px; }
            .action-area { padding: 16px; }
            .primary-action-button { padding: 16px 20px; font-size: 1rem; }
            #search-query-input { padding: 16px; font-size: 1rem; }
            .result-item-card strong { font-size: 1.1rem; }
            .summary-wrapper { padding: 20px; } .summary-title { font-size: 1.5rem; }
            .summary-content { font-size: 0.95rem; line-height: 1.75; }
        }
    </style>
</head>
<body>
    <!-- HTML structure is the same -->
    <div class="app-container">
        <header class="app-header" id="app-main-header">
            <button class="header-back-btn ripple-effect" id="header-back-btn" aria-label="Go back">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div class="header-title-area" id="header-title-content">
                <h1 id="platform-name">NovaSeek</h1>
                <p class="tagline" id="platform-tagline">// Uncover Knowledge //</p>
            </div>
        </header>

        <div class="main-content" id="main-display-area">
            <div class="prompt-text" id="main-prompt">
                Begin your<br>discovery.
            </div>
        </div>

        <div class="action-area" id="act-area-wrapper">
            <div class="action-area-content">
                <button class="primary-action-button ripple-effect" id="initiate-action-btn">
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </span>
                    New Discovery
                </button>
                <div class="search-input-wrapper" id="search-wrapper">
                    <input type="text" id="search-query-input" placeholder="Explore topics..." aria-label="Search topics">
                </div>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // ... (DOM references and most JS logic remain the same) ...
        const initiateActionBtn = document.getElementById('initiate-action-btn');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchQueryInput = document.getElementById('search-query-input');
        const mainDisplayArea = document.getElementById('main-display-area');
        const mainPrompt = document.getElementById('main-prompt');
        
        const appMainHeader = document.getElementById('app-main-header');
        const headerBackBtn = document.getElementById('header-back-btn');
        
        const platformNameDisplay = document.getElementById('platform-name');
        const platformTagline = document.getElementById('platform-tagline');

        const WIKI_API_BASE = "https://en.wikipedia.org/w/api.php";
        let currentView = 'initial';
        let lastSearchResults = null;
        let lastSearchTerm = '';
        let lastPageTitle = '';

        function createRipple(event) {
            const button = event.currentTarget;
            const existingRipple = button.querySelector(".ripple");
            if(existingRipple) { existingRipple.remove(); }
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            circle.style.width = circle.style.height = `${diameter}px`;
            const rect = button.getBoundingClientRect();
            circle.style.left = `${event.clientX - rect.left - radius}px`;
            circle.style.top = `${event.clientY - rect.top - radius}px`;
            circle.classList.add("ripple");
            button.appendChild(circle);
            circle.addEventListener('animationend', () => circle.remove());
        }
        function attachRippleListeners(selector) {
            const rippleElements = document.querySelectorAll(selector);
            rippleElements.forEach(button => {
                button.removeEventListener('click', createRipple); 
                button.addEventListener('click', createRipple);
            });
        }
        attachRippleListeners('.ripple-effect');

        function updateView(view, data = {}) {
            // ... (updateView logic largely the same) ...
            currentView = view;
            mainPrompt.classList.add('hidden');
            searchWrapper.style.display = 'none';
            initiateActionBtn.style.display = 'none'; 
            headerBackBtn.style.display = 'none';
            appMainHeader.classList.remove('center-title');
            mainDisplayArea.innerHTML = '';

            platformTagline.textContent = "// Uncover Knowledge //";
            platformTagline.style.color = "var(--color-on-surface-variant)";
            platformNameDisplay.style.display = 'block';
            mainPrompt.style.color = "var(--color-on-surface-variant)";

            if (view === 'initial') {
                mainDisplayArea.appendChild(mainPrompt);
                mainPrompt.classList.remove('hidden');
                mainPrompt.innerHTML = "Begin your<br>discovery.";
                initiateActionBtn.style.display = 'flex';
                initiateActionBtn.innerHTML = `
                    <span class="icon">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="currentColor"><path d="M0 0h24v24H0V0z" fill="none"/><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </span> New Discovery`;
                appMainHeader.classList.add('center-title');
            } else if (view === 'search') {
                mainDisplayArea.appendChild(mainPrompt);
                mainPrompt.classList.remove('hidden');
                mainPrompt.innerHTML = "What would you<br>like to discover?";
                searchWrapper.style.display = 'block';
                searchQueryInput.value = data.searchTerm || '';
                searchQueryInput.focus();
                headerBackBtn.style.display = 'inline-flex'; 
                platformTagline.textContent = "New Discovery";
            } else if (view === 'results') {
                displaySearchResultsUI(lastSearchResults, lastSearchTerm);
                searchWrapper.style.display = 'block';
                searchQueryInput.value = lastSearchTerm;
                searchQueryInput.focus();
                headerBackBtn.style.display = 'inline-flex';
                platformTagline.textContent = `Discoveries for "${lastSearchTerm}"`;
            } else if (view === 'content') { 
                displaySummaryContent(data.summaryHTML, data.pageTitle, data.fullArticleLink);
                headerBackBtn.style.display = 'inline-flex';
                platformTagline.textContent = `${data.pageTitle}`; 
                lastPageTitle = data.pageTitle;
            } else if (view === 'loading') {
                 mainDisplayArea.appendChild(mainPrompt);
                 mainPrompt.classList.remove('hidden');
                 mainPrompt.innerHTML = data.message || "Loading...";
                 mainPrompt.style.color = "var(--color-on-surface-variant)";
            } else if (view === 'error') {
                mainDisplayArea.appendChild(mainPrompt);
                mainPrompt.classList.remove('hidden');
                mainPrompt.innerHTML = `Error:<br>${data.message}`;
                mainPrompt.style.color = "var(--color-error)";
                headerBackBtn.style.display = 'inline-flex';
                platformTagline.textContent = "An Error Occurred";
            }
            mainDisplayArea.scrollTop = 0;
            attachRippleListeners('.ripple-effect');
        }

        initiateActionBtn.addEventListener('click', (e) => { updateView('search'); });
        headerBackBtn.addEventListener('click', (e) => {
            if (currentView === 'content') { updateView('results', { searchTerm: lastSearchTerm }); }
            else if (currentView === 'results') { updateView('search', { searchTerm: lastSearchTerm }); }
            else if (currentView === 'search' || currentView === 'error') {
                searchQueryInput.value = ''; lastSearchResults = null; lastSearchTerm = '';
                updateView('initial');
            }
        });
        searchQueryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const term = searchQueryInput.value.trim();
                if (term !== '') { lastSearchTerm = term; performSearch(term); }
            }
        });

        async function performSearch(term) { /* ... same ... */ 
            updateView('loading', { message: 'Seeking discoveries...' });
            try {
                const response = await fetch(`${WIKI_API_BASE}?action=query&list=search&srsearch=${term}&srprop=snippet&format=json&origin=*`);
                if (!response.ok) throw new Error(`API error ${response.status}`);
                const data = await response.json();
                lastSearchResults = data.query.search;
                updateView('results');
            } catch (error) { updateView('error', { message: error.message }); }
        }
        function displaySearchResultsUI(results, term) { /* ... same ... */ 
            mainDisplayArea.innerHTML = '';
            if (!results || results.length === 0) {
                const noResultsPrompt = document.createElement('div');
                noResultsPrompt.className = 'prompt-text';
                noResultsPrompt.innerHTML = `No discoveries found for "<span style="color:var(--color-on-surface);">${term}</span>".<br><span class="prompt-text subtle">Try a different topic.</span>`;
                mainDisplayArea.appendChild(noResultsPrompt); return;
            }
            const ul = document.createElement('ul');
            ul.className = 'results-list';
            results.forEach(result => {
                const li = document.createElement('li');
                li.className = 'result-item-card ripple-effect'; 
                const snippetDiv = document.createElement('div');
                snippetDiv.innerHTML = result.snippet;
                const cleanSnippet = snippetDiv.textContent || snippetDiv.innerText || "";
                li.innerHTML = `<strong>${result.title}</strong><small>${cleanSnippet}...</small>`;
                li.dataset.pageTitle = result.title;
                ul.appendChild(li);
            });
            mainDisplayArea.appendChild(ul);
            mainDisplayArea.querySelectorAll('.result-item-card').forEach(card => {
                card.addEventListener('click', (e) => fetchSummaryContent(e.currentTarget.dataset.pageTitle));
            });
        }
        async function fetchSummaryContent(pageTitle) { /* ... same ... */ 
            updateView('loading', { message: `Preparing summary for ${pageTitle}...`});
            const params = new URLSearchParams({
                action: "query", prop: "extracts", titles: pageTitle,
                exintro: "true", explaintext: "false", format: "json", origin: "*"
            });
            try {
                const response = await fetch(`${WIKI_API_BASE}?${params}`);
                if (!response.ok) throw new Error(`API error ${response.status}`);
                const data = await response.json();
                const pages = data.query.pages; const pageId = Object.keys(pages)[0];
                if (pageId && pages[pageId].extract) {
                    const summaryHTML = pages[pageId].extract;
                    const wikipediaArticleURL = `https://en.wikipedia.org/wiki/${encodeURIComponent(pageTitle.replace(/ /g, '_'))}`;
                    updateView('content', { 
                        summaryHTML: summaryHTML, pageTitle: pageTitle, fullArticleLink: wikipediaArticleURL
                    });
                } else {
                    if (pageId === "-1") { throw new Error(`The topic "${pageTitle}" may not exist on Wikipedia.`); }
                    throw new Error("Summary (extract) not found or empty.");
                }
            } catch (error) { updateView('error', { message: `Could not load summary for ${pageTitle}: ${error.message}` }); }
        }

        // MODIFIED FUNCTION
        function displaySummaryContent(summaryHTML, pageTitle, wikipediaArticleURL) { 
            mainDisplayArea.innerHTML = ''; 
            const wrapper = document.createElement('div');
            wrapper.className = 'summary-wrapper';

            const titleHeading = document.createElement('h2'); 
            titleHeading.className = 'summary-title';
            titleHeading.textContent = `${pageTitle}`; // Display page title directly as summary heading
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'summary-content'; 
            contentDiv.innerHTML = summaryHTML; 
            
            const attributionDiv = document.createElement('div');
            attributionDiv.className = 'summary-attribution'; 
            // Make "Wikipedia (Page Title)" the link
            attributionDiv.innerHTML = `
                Summary from <a href="${wikipediaArticleURL}" target="_blank" rel="noopener noreferrer">Wikipedia (${pageTitle})</a>.
                Content is available under <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank" rel="noopener noreferrer">CC BY-SA 3.0</a>.
            `;
            
            // The standalone button is removed.
            // The link is now part of the attribution text.

            wrapper.appendChild(titleHeading);
            wrapper.appendChild(contentDiv);
            // No longer appending fullArticleBtn here
            wrapper.appendChild(attributionDiv);
            mainDisplayArea.appendChild(wrapper);
        }
        
        updateView('initial');
    });
    </script>
</body>
</html>
